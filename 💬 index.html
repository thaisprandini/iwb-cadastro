<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#5756A2;--purple-dark:#3d3c7a;--purple-light:#7170b8;--white:#fff;--gray-100:#f6f6fb;--gray-500:#6b6b8a;--gray-800:#2a2a3d}
body{font-family:'DM Sans',sans-serif;background:var(--gray-100);min-height:100vh;color:var(--gray-800)}
header{background:var(--white);border-bottom:3px solid var(--purple);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 18px rgba(87,86,162,.10)}
.iwb-logo{display:flex;flex-direction:column;line-height:1}
.iwb-logo .iwb-box{background:var(--purple);color:#fff;padding:6px 12px;font-size:18px;font-weight:700}
.iwb-logo .iwb-box span{font-size:22px;display:block}
.iwb-logo .iwb-sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--purple);margin-top:4px;font-weight:600}
.apoio-block{display:flex;flex-direction:column;align-items:center;gap:4px}
.apoio-label{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gray-500)}
.ons-text{font-size:24px;font-weight:800;color:#4a5e28;letter-spacing:.05em}
.ons-sub{font-size:8px;color:#4a5e28;text-align:center;line-height:1.3;max-width:100px}
.hero{background:linear-gradient(135deg,var(--purple-dark) 0%,var(--purple) 60%,var(--purple-light) 100%);padding:44px 40px 40px;text-align:center;overflow:hidden}
.hero h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:#fff;margin-bottom:8px}
.hero p{font-size:14px;color:rgba(255,255,255,.72);font-weight:300}
.vagas-badge{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:5px 16px;font-size:12px;color:#fff;margin-top:12px;font-weight:500}
.page-body{display:flex;justify-content:center;padding:36px 20px 56px}
.form-card{background:var(--white);border-radius:18px;padding:44px 48px;width:100%;max-width:620px;box-shadow:0 8px 48px rgba(87,86,162,.12)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px 24px}
.form-group{display:flex;flex-direction:column;gap:7px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--purple)}
input{border:1.5px solid #d0d0e2;border-radius:10px;padding:13px 16px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--gray-800);background:#fafafa;transition:border-color .2s;outline:none;width:100%}
input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(87,86,162,.12);background:#fff}
input::placeholder{color:#b0b0c8}
